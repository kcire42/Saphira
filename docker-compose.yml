
services:

  # --- Ingest Process Service
  ingest_service:
    build: ./ingest_service
    container_name: ingestion_service
    volumes:
      - ./storage/raw:/app/storage/raw
    networks:
      - isolated_backend
  # --- Clean Process Service
  clean_service:
    build: ./clean_service
    container_name: cleaning_service
    volumes:
      - ./storage/clean:/app/storage/process
    #environment:
    #  - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
    #  - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    networks:
      - isolated_backend

  # --- BASE DE DATOS RELACIONAL (EL CEREBRO ESTRUCTURADO) ---
  
  database_service:
    build: ./database_service
    container_name: database_service
    volumes:
      - ./database_service:/app
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - isolated_backend

  postgres_db:
    image: postgres:15-alpine
    container_name: postgres_service
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=proweb_pass
      - POSTGRES_DB=DEV
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U admin -d DEV"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - isolated_backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_ui
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres_db
    networks:
      - isolated_backend

  # --- SERVICIOS DE LLM Y VECTOR DB 

  ollama:
    image: ollama/ollama
    container_name: llm_service
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    networks:
       - isolated_backend
  
  chroma:
    image: chromadb/chroma
    container_name: chroma_service
    ports:
      - "11743:8000"
    volumes:
      - chroma_data:/chroma/data
    restart: unless-stopped
    networks:
       - isolated_backend

  web:
    build: 
      context: ./llm_Service
      dockerfile: Dockerfile
    container_name: fastapi_llm
    restart: always
    ports:
      - '8000:8000'
    volumes:
      - ./llm_Service:/app
    environment:
      - APP_ENV=docker
      - OLLAMA_HOST=ollama
      - CHROMA_HOST=chroma
      - MODEL_NAME=llama3.1:8b
      - PYTHONPATH=/app
    depends_on:
      ollama:
        condition: service_started
      chroma:
        condition: service_started
    networks:
       - isolated_backend

volumes:
  ollama:
  chroma:
  postgres_db:



