
services:

  # Ingest Process Service
  ingest_process:
    build: ./ingest_process
    container_name: ingestion_service
    volumes:
      - ./storage/raw:/app/storage/raw
    networks:
      - isolated_backend
  # clean process Service
  clean_processor:
    build: ./clean_processor
    container_name: cleaning_service
    volumes:
      - ./storage/clean:/app/storage/process
    #environment:
    #  - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
    #  - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    networks:
      - isolated_backend

  ollama:
    image: ollama/ollama
    container_name: llm_service
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    networks:
       - isolated_backend
  
  chroma:
    image: chromadb/chroma
    container_name: chroma_service
    ports:
      - "11743:8000"
    volumes:
      - chroma_data:/chroma/data
    restart: unless-stopped
    networks:
       - isolated_backend

  # --- BASE DE DATOS RELACIONAL (EL CEREBRO ESTRUCTURADO) ---
  postgres_db:
    image: postgres:15-alpine
    container_name: postgres_service
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=proweb_pass
      - POSTGRES_DB= DEV
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - isolated_backend

  web:
    build: 
      context: ./llm_Service
      dockerfile: Dockerfile
    container_name: fastapi_llm
    restart: always
    ports:
      - '8000:8000'
    volumes:
      - ./llm_Service:/app
    environment:
      - APP_ENV=docker
      - OLLAMA_HOST=ollama
      - CHROMA_HOST=chroma
      - MODEL_NAME=llama3.1:8b
      - PYTHONPATH=/app
    depends_on:
      ollama:
        condition: service_started
      chroma:
        condition: service_started
    networks:
       - isolated_backend

volumes:
  ollama_data:
  chroma_data:
  postgres_data:

networks:
  isolated_backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24

