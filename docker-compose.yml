
services:
  ollama:
    image: ollama/ollama
    container_name: llm_service
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    networks:
       - isolated_backend
  
  chroma:
    image: chromadb/chroma
    container_name: chroma_service
    ports:
      - "11743:8000"
    volumes:
      - chroma_data:/chroma/data
    restart: unless-stopped
    networks:
       - isolated_backend


  web:
    build: .
    container_name: fastapi_llm
    restart: always
    ports:
      - '8000:8000'
    volumes:
      - .:/app
    environment:
      - APP_ENV=docker
      - OLLAMA_HOST=ollama
      - CHROMA_HOST=chroma
      - MODEL_NAME=llama3.1:8b
      - PYTHONPATH=/app
    depends_on:
      ollama:
        condition: service_started
      chroma:
        condition: service_started
    networks:
       - isolated_backend

volumes:
  ollama_data:
  chroma_data:

networks:
  isolated_backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24

